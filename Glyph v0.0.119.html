        body {

            background-color: #002D47;
            color: #76E0B9;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
        }

        /* 8-Bit Pixel Borders */
        .pixel-border {
            box-shadow:
                0 -4px 0 0 #54D8A8,
                0 4px 0 0 #54D8A8,
                -4px 0 0 0 #54D8A8,
                4px 0 0 0 #54D8A8;
            background: #001D2E;
        }

        .pixel-border-small {
            box-shadow:
                0 -2px 0 0 #54D8A8,
                0 2px 0 0 #54D8A8,
                -2px 0 0 0 #54D8A8,
                2px 0 0 0 #54D8A8;
        }

        .pixel-btn {
            position: relative;
            background: #54D8A8;
            color: #002D47;
            padding: 10px;
            box-shadow: inset -4px -4px 0 0 #3ea17e;
            transition: all 0.1s;
            text-align: center;
        }
        .pixel-btn:active {
            box-shadow: inset 4px 4px 0 0 #3ea17e;
            transform: translateY(2px);
        }

        /* Danger Style */
        .pixel-btn-danger {
            background: #ef4444;
            color: white;
            box-shadow: inset -4px -4px 0 0 #991b1b;
        }
        .pixel-btn-danger:active {
            box-shadow: inset 4px 4px 0 0 #991b1b;
        }

        /* Secondary (dark bg) button */
        .pixel-btn-secondary {
            background: #001D2E;
            color: #54D8A8;
            box-shadow:
                0 -2px 0 0 #54D8A8,
                0 2px 0 0 #54D8A8,
                -2px 0 0 0 #54D8A8,
                2px 0 0 0 #54D8A8,
                inset -4px -4px 0 0 #3ea17e;
        }
        .pixel-btn-secondary:active {
            box-shadow:
                0 -2px 0 0 #54D8A8,
                0 2px 0 0 #54D8A8,
                -2px 0 0 0 #54D8A8,
                2px 0 0 0 #54D8A8,
                inset 4px 4px 0 0 #3ea17e;
            transform: translateY(2px);
        }

        /* Tile & Key States */
        .tile-correct { background-color: #54D8A8; color: #002D47; box-shadow: inset -4px -4px 0 0 #3ea17e; }
        .tile-present { background-color: #FACC15; color: #002D47; box-shadow: inset -4px -4px 0 0 #ca8a04; }
        .tile-absent { background-color: #3a3a3a; color: #aaaaaa; box-shadow: inset -4px -4px 0 0 #222222; }

        /* Greyed out keyboard state */
        .key-absent  { background-color: #2a2a2a !important; color: #666666 !important; box-shadow: inset -4px -4px 0 0 #1a1a1a !important; }
        .key-correct { background-color: #54D8A8 !important; color: #002D47 !important; box-shadow: inset -4px -4px 0 0 #3ea17e !important; }
        .key-present { background-color: #FACC15 !important; color: #002D47 !important; box-shadow: inset -4px -4px 0 0 #ca8a04 !important; }

        .tile-empty { border: 4px solid #003D5B; background: #001D2E; }
        .tile-active { border: 4px solid #76E0B9; background: #002D47; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 0.8s infinite; }

        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #001D2E; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #54D8A8; }

        .text-glow { text-shadow: 0 0 15px #54D8A8; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Accordion Styles */
        details summary { list-style: none; cursor: pointer; outline: none; }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary { border-bottom: 2px solid #54D8A8; margin-bottom: 10px; }

        // ── Seeded PRNG (mulberry32) ──────────────────────────────────────────
        function mulberry32(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;

            };

        }

        }

            const rng = mulberry32(seedToInt(seed));

                words.push(pool.splice(idx, 1)[0]);

                timeLeft: state.timeLeft,
                history: state.history.map(r => ({ w: r.word, g: r.guesses, s: r.solved ? 1 : 0 })),

        function computeLegitimacyScore() {

            const gGaps = ts.slice(1).map((t, i) => t - ts[i]);
            const gMean = gGaps.reduce((a, b) => a + b, 0) / gGaps.length;
            const gSD = Math.sqrt(gGaps.reduce((a, b) => a + (b - gMean) ** 2, 0) / gGaps.length);

                const ksSd = Math.sqrt(ksGaps.reduce((a, b) => a + (b - ksMean) ** 2, 0) / ksGaps.length);

            return Array.from({length: GUESSES_PER_WORD}).map((_, i) => {
                const guess = (guesses[i] || '').toUpperCase();
                const statuses = guess ? getRowStatuses(guess, target.toUpperCase()) : Array(WORD_LENGTH).fill('tile-empty');
                return `<div class="flex gap-[2px]">${Array.from({length: WORD_LENGTH}).map((_, j) => {
                    return `<div class="w-6 h-6 flex items-center justify-center text-[7px] font-black ${statuses[j]}">${guess[j] || ''}</div>`;
                }).join('')}</div>`;
            }).join('');
        }

        let state = {
            view: 'START',
            targetWords: [],
            currentIdx: 0,
            guesses: [],
            currentGuess: "",
            solvedCount: 0,
            allGuessesCount: 0,
            timeLeft: COUNTDOWN_START,
            timerInterval: null,
            history: [],
            message: "",
            isLocked: false,
            stats: loadStats(),
            matchSeed: null,
            opponentData: null,
            finalScore: null,
            antiBot: { guessTimestamps: [], keyTimestamps: [], lastGuessTime: 0, fastGuessCount: 0 }
        };

        const viewEl = document.getElementById('view');
        const overlayEl = document.getElementById('overlay');
        const headerEl = document.getElementById('game-header');

        function loadStats() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (!data) return { highScore: 0, matchHistory: [] };
            try {
                const parsed = JSON.parse(data);
                if (!parsed || typeof parsed !== 'object') return { highScore: 0, matchHistory: [] };
                return {
                    highScore: (typeof parsed.highScore === 'number' && isFinite(parsed.highScore)) ? parsed.highScore : 0,
                    matchHistory: Array.isArray(parsed.matchHistory) ? parsed.matchHistory : []
                };
            } catch (e) {
                return { highScore: 0, matchHistory: [] };
            }
        }

        function saveMatch(score, isForfeit = false) {
            state.stats.highScore = Math.max(state.stats.highScore, score);
            const roundsToSave = [...state.history];
            if (isForfeit && state.targetWords.length > 0) {
                roundsToSave.push({
                    word: state.targetWords[state.currentIdx],
                    guesses: [...state.guesses],
                    solved: false,
                    isPartial: true
                });
            }
            state.stats.matchHistory.unshift({
                score: score,
                date: new Date().toLocaleDateString(),
                wordsSolved: state.solvedCount,
                rounds: JSON.parse(JSON.stringify(roundsToSave)),
                status: isForfeit ? 'FORFEIT' : 'FINISHED'
            });
            state.stats.matchHistory = state.stats.matchHistory.slice(0, 10);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.stats));
        }

        function changeView(newView) {
            state.view = newView;
            if (newView === 'PLAYING') {
                headerEl.classList.remove('mb-2', 'mb-12'); headerEl.classList.add('mb-4');
                history.pushState({ view: 'game' }, '');
            } else if (newView === 'RECORDS' || newView === 'RULES' || newView === 'FINISHED') {
                headerEl.classList.remove('mb-4', 'mb-12'); headerEl.classList.add('mb-2');
                history.pushState({ view: newView }, '');
            } else {
                headerEl.classList.remove('mb-4', 'mb-12'); headerEl.classList.add('mb-2');
            }
            render();
        }

        function confirmForfeit() {
            if (!overlayEl.classList.contains('hidden')) return;
            overlayEl.classList.replace('hidden', 'flex');
            overlayEl.innerHTML = `
                <div class="w-full max-w-sm pixel-border p-10 bg-[#001D2E] animate-fade-in">
                    <p class="text-[10px] mb-8 border-b-4 border-[#ef4444] pb-4 text-glow uppercase text-center" style="text-shadow: 0 0 10px #ef4444">Confirm Forfeit?</p>
                    <div class="grid gap-6">
                        <button onclick="executeForfeit()" class="pixel-btn pixel-btn-danger w-full text-sm py-4">YES, FORFEIT</button>
                        <button onclick="closeOverlay()" class="pixel-btn w-full text-sm py-4">NO, RETURN</button>
                    </div>
                </div>
            `;
        }

        function executeForfeit() {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            saveMatch(calculateScore(), true);
            state.targetWords = [];
            state.currentIdx = 0;
            state.guesses = [];
            state.currentGuess = "";
            state.solvedCount = 0;
            state.allGuessesCount = 0;
            state.history = [];
            state.message = "";
            state.isLocked = false;
            state.timeLeft = COUNTDOWN_START;
            state.matchSeed = null;
            state.opponentData = null;
            state.finalScore = null;
            state.antiBot = { guessTimestamps: [], keyTimestamps: [], lastGuessTime: 0, fastGuessCount: 0 };
            state.stats = loadStats();
            closeOverlay();
            changeView('START');
        }

        let _pendingMatchCode = null;
        function copyMatchCode(btn) {
            if (!_pendingMatchCode) return;
            try {
                navigator.clipboard.writeText(_pendingMatchCode).then(() => {
                    btn.textContent = 'COPIED!';
                    setTimeout(() => { btn.textContent = 'COPY CODE'; }, 1500);
                }).catch(() => {
                    _copyFallback(btn);
                });
            } catch(e) {
                _copyFallback(btn);
            }
        }
        function _copyFallback(btn) {
            try {
                const ta = document.createElement('textarea');
                ta.value = _pendingMatchCode;
                ta.style.position = 'fixed'; ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = 'COPIED!';
            } catch(e2) {
                btn.textContent = 'COPY FAILED';
            }
            setTimeout(() => { btn.textContent = 'COPY CODE'; }, 1500);
        }
        function showMatchCode() {
            const code = generateMatchCode();
            _pendingMatchCode = code;
            const section = document.getElementById('share-code-section');
            const btn = document.getElementById('share-btn');
            if (section) {
                section.innerHTML = `
                    <div class="pixel-border p-4 w-full mb-2">
                        <p class="text-[8px] text-[#54D8A8] mb-3 uppercase tracking-widest">Match Code — share with opponent</p>
                        <p class="text-[7px] break-all opacity-80 mb-3 leading-relaxed">${code}</p>
                        <button onclick="copyMatchCode(this)"
                            class="pixel-btn w-full text-[9px] py-2">COPY CODE</button>
                    </div>`;
            }
            if (btn) btn.remove();
        }

        function startMatch(options = {}) {
            _pendingMatchCode = null;
            const matchSeed = options.seed || generateMatchSeed();
            const targets = getSeededWords(matchSeed);
            if (!options.seed) state.opponentData = null;
            state.matchSeed = matchSeed;
            state.targetWords = targets;
            state.currentIdx = 0;
            state.guesses = [];
            state.solvedCount = 0;
            state.allGuessesCount = 0;
            state.currentGuess = "";
            state.history = [];
            state.timeLeft = COUNTDOWN_START;
            state.isLocked = false;
            state.message = "";
            state.finalScore = null;
            state.antiBot = { guessTimestamps: [], keyTimestamps: [], lastGuessTime: 0, fastGuessCount: 0 };

            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.timeLeft = Math.max(0, state.timeLeft - 1);
                if (state.timeLeft <= 0) {
                    clearInterval(state.timerInterval);
                    state.timerInterval = null;
                    state.history.push({ word: state.targetWords[state.currentIdx], guesses: [...state.guesses], solved: false });
                    state.finalScore = calculateScore();
                    saveMatch(state.finalScore);
                    changeView('FINISHED');
                }
                updateTimerUI();
            }, 1000);

            changeView('PLAYING');
            updateTimerUI();
        }

        function getRowStatuses(guess, target) {
            let statuses = Array(WORD_LENGTH).fill('tile-absent');
            let targetArr = target.split('');
            let guessArr = guess.split('');
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessArr[i] === targetArr[i]) {
                    statuses[i] = 'tile-correct';
                    targetArr[i] = null;
                    guessArr[i] = null;
                }
            }
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessArr[i] !== null) {
                    let idx = targetArr.indexOf(guessArr[i]);
                    if (idx !== -1) {
                        statuses[i] = 'tile-present';
                        targetArr[idx] = null;
                    }
                }
            }
            return statuses;
        }

        function getKeyStates(guesses, target) {
            const states = {};
            const priority = { 'key-correct': 3, 'key-present': 2, 'key-absent': 1 };
            guesses.forEach(guess => {
                const statuses = getRowStatuses(guess, target);
                guess.split('').forEach((letter, i) => {
                    const keyState = statuses[i] === 'tile-correct' ? 'key-correct'
                                   : statuses[i] === 'tile-present' ? 'key-present'
                                   : 'key-absent';
                    if (!states[letter] || priority[keyState] > priority[states[letter]]) {
                        states[letter] = keyState;
                    }
                });
            });
            return states;
        }

        function handleInput(key) {
            if (state.view !== 'PLAYING' || state.isLocked) return;
            if (key === 'ENTER') {
                submitGuess();
            } else if (key === 'BKSP') {
                state.currentGuess = state.currentGuess.slice(0, -1);
                render();
            } else if (state.currentGuess.length < WORD_LENGTH && key.length === 1) {
                state.antiBot.keyTimestamps.push(Date.now());
                state.currentGuess += key;
                render();
            }
        }

        function submitGuess() {
            if (state.currentGuess.length !== WORD_LENGTH || state.isLocked) return;
            const guess = state.currentGuess.toUpperCase();
            const now = Date.now();
            if (state.antiBot.lastGuessTime > 0 && now - state.antiBot.lastGuessTime < 1500) state.antiBot.fastGuessCount++;
            state.antiBot.guessTimestamps.push(now);
            state.antiBot.lastGuessTime = now;

            // DEV CONSOLE CHECK
            if (guess === 'CONER') {
                state.currentGuess = "";
                openDevConsole();
                render();
                return;
            }

            if (!VALID_WORDS_SET.has(guess)) {
                state.isLocked = true;
                state.message = "NOT IN WORD LIST";
                setTimeout(() => {
                    if (state.message === "NOT IN WORD LIST") {
                        state.message = "";
                        state.isLocked = false;
                        render();
                    }
                }, 1200);
                render();
                return;
            }

            const target = state.targetWords[state.currentIdx].toUpperCase();
            state.guesses.push(guess);
            state.allGuessesCount++;
            state.currentGuess = "";

            if (guess === target) {
                state.solvedCount++;
                state.message = "CLEARED!";
                state.isLocked = true;
                setTimeout(nextRound, 1200);
            } else if (state.guesses.length >= GUESSES_PER_WORD) {
                state.message = `FAIL! WORD: <span style="color:#ef4444">${target}</span>`;
                state.isLocked = true;
                setTimeout(nextRound, 2000);
            }
            render();
        }

        function nextRound() {
            state.history.push({
                word: state.targetWords[state.currentIdx],
                guesses: [...state.guesses],
                solved: state.guesses.includes(state.targetWords[state.currentIdx].toUpperCase())
            });
            if (state.currentIdx < WORDS_TO_SOLVE - 1) {
                state.currentIdx++;
                state.guesses = [];
                state.isLocked = false;
                state.message = "";
                render();
            } else {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
                state.finalScore = calculateScore();
                saveMatch(state.finalScore);
                changeView('FINISHED');
            }
        }

        function openDevConsole() {
            overlayEl.classList.replace('hidden', 'flex');
            overlayEl.innerHTML = `
                <div class="w-full max-w-sm pixel-border p-10 bg-[#001D2E] animate-fade-in">
                    <p class="text-[10px] mb-8 border-b-4 border-[#54D8A8] pb-4 text-glow uppercase text-center">Tactical Override</p>
                    <div class="grid gap-6">
                        <button onclick="devWin()" class="pixel-btn w-full text-sm py-4">WIN</button>
                        <button onclick="devLose()" class="pixel-btn pixel-btn-danger w-full text-sm py-4">LOSE</button>
                        <button onclick="closeOverlay()" class="text-[8px] opacity-40 uppercase underline mt-4 text-center">Close Console</button>
                    </div>
                </div>
            `;
        }

        function devWin() {
            const target = state.targetWords[state.currentIdx].toUpperCase();
            state.guesses.push(target);
            state.allGuessesCount++;
            state.solvedCount++;
            state.message = "OVERRIDE: WIN";
            state.isLocked = true;
            closeOverlay();
            setTimeout(nextRound, 1000);
            render();
        }

        function devLose() {
            const target = state.targetWords[state.currentIdx].toUpperCase();
            while(state.guesses.length < GUESSES_PER_WORD) {
                state.guesses.push(target);
                state.allGuessesCount++;
            }
            state.message = `FAIL! WORD: <span style="color:#ef4444">${target}</span>`;
            state.isLocked = true;
            closeOverlay();
            setTimeout(nextRound, 2000);
            render();
        }

        function closeOverlay() {
            overlayEl.classList.replace('flex', 'hidden');
        }

        function acceptChallenge() {
            const input = document.getElementById('challenge-code-input');
            const code = input?.value.trim();
            if (!code) return;
            const data = parseMatchCode(code);
            const errEl = document.getElementById('challenge-error');
            if (!data) {
                if (errEl) errEl.style.display = 'block';
                if (input) input.value = '';
                return;
            }
            if (errEl) errEl.style.display = 'none';
            state.opponentData = data;
            startMatch({ seed: data.seed });
        }

        function calculateScore() {
            if (state.allGuessesCount === 0) return 0;
            const basePoints = state.solvedCount * 1000;
            const accuracyFactor = state.solvedCount / state.allGuessesCount;
            const timeBonus = state.solvedCount > 0 ? Math.floor(state.timeLeft * 2) : 0;
            return Math.floor((basePoints * accuracyFactor) + timeBonus);
        }

        function updateTimerUI() {
            const el = document.getElementById('timer-val');
            if (el) {
                const t = Math.max(0, state.timeLeft);
                const mins = Math.floor(t / 60);
                const secs = t % 60;
                el.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        function setupMobileInput() {
            const input = document.getElementById('mobile-input');
            if (!input || input._glyphListenersAttached) return;
            input._glyphListenersAttached = true;
            input.value = '';
            input.addEventListener('input', function(e) {
                if (state.view !== 'PLAYING' || state.isLocked) return;
                if (e.data && /^[A-Za-z]$/.test(e.data)) {
                    handleInput(e.data.toUpperCase());
                } else if (e.inputType === 'deleteContentBackward' || e.inputType === 'deleteContentForward' || (!e.data && this.value.length === 0)) {
                    handleInput('BKSP');
                }
                this.value = '';
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { handleInput('ENTER'); e.preventDefault(); }
            });
        }

        function render() {
            const isPlaying = state.view === 'PLAYING';

            const subtitle = document.getElementById('header-subtitle');
            const titleWrap = document.getElementById('header-title-wrap');
            if (bar) bar.style.display = isPlaying ? 'none' : '';
            if (subtitle) subtitle.style.display = isPlaying ? 'none' : '';
            if (titleWrap) titleWrap.style.marginBottom = isPlaying ? '0' : '';
            viewEl.style.justifyContent = state.view === 'START' ? 'flex-start' : '';

            if (state.view === 'START') {
                viewEl.innerHTML = `
                    <div class="w-full max-w-2xl flex flex-col items-center space-y-5 animate-fade-in px-4 pt-4 pb-6">
                        <div class="pixel-border p-4 text-center w-full max-w-[480px]">
                            <p class="text-[10px] md:text-[12px] mb-2 text-[#54D8A8] tracking-widest uppercase">HIGH SCORE</p>
                            <p class="text-3xl md:text-5xl text-glow">${state.stats.highScore}</p>
                        </div>

                        <div class="flex flex-col w-full max-w-[480px] space-y-3">
                            <button onclick="startMatch({})" class="pixel-btn w-full text-xl md:text-2xl py-4">START MATCH</button>
                            <div class="pixel-border p-3 w-full">
                                <p class="text-[7px] text-[#54D8A8] mb-2 uppercase tracking-widest">Accept a challenge</p>
                                <input id="challenge-code-input" type="text" placeholder="Paste match code..."
                                    class="w-full bg-transparent text-[8px] uppercase tracking-widest outline-none placeholder-[#54D8A8]/30 text-[#76E0B9]"
                                    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                                    onkeydown="if(event.key==='Enter') acceptChallenge()">
                                <p id="challenge-error" class="text-[7px] text-[#ef4444] mt-1" style="display:none">Invalid or tampered code.</p>
                            </div>
                            <button onclick="acceptChallenge()" class="pixel-btn pixel-btn-secondary w-full text-[12px] py-3">ACCEPT CHALLENGE</button>
                            <button onclick="changeView('RECORDS')" class="pixel-btn w-full text-[12px] md:text-[14px] py-3">MATCH HISTORY</button>
                            <button onclick="changeView('RULES')" class="pixel-btn w-full text-[12px] md:text-[14px] py-3">GAME RULES</button>
                        </div>
                    </div>`;
            } else if (state.view === 'RULES') {
                viewEl.innerHTML = `
                    <div class="w-full max-w-2xl pixel-border p-10 animate-fade-in mx-4">
                        <p class="text-[12px] mb-8 border-b-4 border-[#54D8A8] pb-4 text-glow text-center uppercase tracking-widest">Game Manual</p>
                        <div class="max-h-[500px] overflow-y-auto custom-scroll pr-4">
                            <ul class="text-[10px] leading-[2.2] space-y-8 text-[#76E0B9]/90">
                                <li>The goal is simple: solve 3 different hidden words as fast as you can to get the highest score.</li>

                                    <br>> <span style="color:#54D8A8">[GREEN]</span> means the letter is correct and in the right spot.

                                    <br>> <span style="color:#aaaaaa">[GREY]</span> means that letter isn't used in the word at all.
                                </li>
                                <li>To help you be precise, if a letter appears only once in the word but you guess it twice, only one tile will light up green or yellow. This tells you exactly how many times that letter is actually used.</li>
                                <li>Your final score is based on how many words you found and how many guesses you used. Plus, finishing quickly adds a big speed bonus to your total!</li>
                            </ul>
                            <details class="mt-8 border-t-2 border-[#003D5B] pt-6">

                                <ul class="text-[8px] leading-[2] space-y-3 text-[#76E0B9]/70 mt-4">
                                    <li><span class="text-[#54D8A8]">v0.0.119</span> — Fixed 18 bugs: score drift on finish screen, timer format, duplicate words removed, clipboard fallback for non-HTTPS, forfeit overlay guard, mobile input delete detection, challenge code Enter key, back-button timer clear, header margin cleanup, and dev-console stability fixes.</li>
                                </ul>

                        </div>
                        <button onclick="changeView('START')" class="pixel-btn w-full mt-12 text-[12px]">BACK TO MAIN MENU</button>
                    </div>`;
            } else if (state.view === 'RECORDS') {
                const historyHtml = state.stats.matchHistory.length > 0
                    ? state.stats.matchHistory.map(h => {
                        const roundsHtml = (h.rounds || []).map((r, i) => `
                            <div class="mt-4 border-l-4 border-[#54D8A8] pl-3 py-1 bg-[#002D47]/40">

                                <div class="text-[7px] text-white/60 leading-relaxed uppercase">
                                    ${r.guesses.length > 0 ? r.guesses.map(g => `[ ${g} ]`).join(' ') : '[ NO DATA ]'}
                                </div>

                        const statusTag = h.status === 'FORFEIT' ? '<span style="color:#ef4444; font-size: 7px; margin-left: 5px;">[FORFEIT]</span>' : '';
                        return `
                        <div class="mb-6 border-b border-[#003D5B] pb-4">
                            <details class="w-full">
                                <summary class="flex justify-between items-center text-[10px] w-full">
                                    <span class="opacity-60">${h.date}</span>
                                    <span class="text-[#54D8A8]">${h.score} PTS ${statusTag} <small>▼</small></span>

                                <div class="mt-4 animate-fade-in">

                    }).join('')
                    : `<div class="text-[12px] opacity-40 py-16 text-center tracking-widest uppercase">EMPTY LOG</div>`;

                viewEl.innerHTML = `
                    <div class="w-full max-w-2xl pixel-border p-10 animate-fade-in mx-4">

            } else if (state.view === 'PLAYING') {

                const keyStates = getKeyStates(state.guesses, target);
                viewEl.innerHTML = `

                            </div>

                            </div>
                        </div>
                        <div class="h-7 mb-1 text-[10px] flex items-center justify-center text-center px-4">
                            ${state.message ? `<span class="blink">[ ${state.message} ]</span>` : ''}
                        </div>
                        <input id="mobile-input" type="text"
                            autocomplete="off" autocorrect="off" autocapitalize="characters"
                            spellcheck="false" enterkeyhint="go"
                            style="position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0;">
                        <div class="grid grid-rows-6 gap-2 mb-2 p-3 pixel-border cursor-pointer"
                             ontouchstart="document.getElementById('mobile-input').focus()">
                            ${Array.from({length: 6}).map((_, i) => {
                                const guess = state.guesses[i] || "";
                                const isCurrent = i === state.guesses.length;
                                const rowStatuses = i < state.guesses.length ? getRowStatuses(guess, target) : [];
                                return `<div class="flex gap-2">
                                    ${Array.from({length: 5}).map((_, j) => {
                                        let char = isCurrent ? (state.currentGuess[j] || "") : (guess[j] || "");
                                        let cls = i < state.guesses.length ? rowStatuses[j] : (isCurrent && char ? 'tile-active' : 'tile-empty');
                                        return `<div class="w-10 h-10 flex items-center justify-center text-lg font-black ${cls}">${char}</div>`;
                                    }).join('')}
                                </div>`;
                            }).join('')}
                        </div>
                        <div class="w-full max-w-lg flex gap-1 px-1 mb-2">
                            <div class="flex-1 grid gap-1">
                                ${[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']].map(row => `
                                    <div class="flex justify-center gap-[3px]">
                                        ${row.map(key => {
                                            const keyCls = keyStates[key] || '';
                                            return `<button onclick="handleInput('${key}')" class="pixel-btn ${keyCls} w-7 text-[9px] h-10">${key}</button>`;
                                        }).join('')}
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex flex-col gap-1">
                                <button onclick="handleInput('ENTER')" class="pixel-btn text-[7px] w-10 flex-1 flex items-center justify-center uppercase tracking-wider">ENTER</button>
                                <button onclick="handleInput('BKSP')" class="pixel-btn pixel-btn-danger text-[7px] w-10 flex-1 flex items-center justify-center uppercase tracking-wider">DEL</button>
                            </div>
                        </div>
                        <button onclick="confirmForfeit()" class="pixel-btn pixel-btn-danger text-[10px] py-2 px-8 w-full max-w-[400px] uppercase tracking-widest">
                            forfeit, and back to main menu
                        </button>
                    </div>`;
                updateTimerUI();
                setupMobileInput();
            } else if (state.view === 'FINISHED') {
                const finalScore = state.finalScore !== null ? state.finalScore : calculateScore();
                const opp = state.opponentData;

                if (opp) {
                    // ── Side-by-side result (Player 2 accepted challenge) ──────
                    const oppScore = opp.score;
                    const iWin = finalScore > oppScore;
                    const tie = finalScore === oppScore;
                    const resultLabel = tie ? 'DRAW' : iWin ? 'YOU WIN' : 'YOU LOSE';
                    const resultColor = tie ? '#FACC15' : iWin ? '#54D8A8' : '#ef4444';
                    const fmtTime = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
                    viewEl.innerHTML = `
                        <div class="w-full max-w-2xl flex flex-col items-center animate-fade-in px-2 pb-4">
                            <p class="text-2xl text-glow mb-3 uppercase" style="color:${resultColor}">${resultLabel}</p>
                            <div class="grid grid-cols-2 gap-3 w-full mb-4">
                                <div class="pixel-border p-3 text-center">
                                    <p class="text-[7px] mb-1 opacity-60 uppercase">You</p>
                                    <p class="text-lg text-[#54D8A8]">${finalScore}</p>
                                    <p class="text-[7px] opacity-40">${fmtTime(state.timeLeft)} left · ${state.solvedCount}/${WORDS_TO_SOLVE}</p>
                                </div>
                                <div class="pixel-border p-3 text-center">
                                    <p class="text-[7px] mb-1 opacity-60 uppercase">Opponent</p>
                                    <p class="text-lg text-[#76E0B9]">${oppScore}</p>
                                    <p class="text-[7px] opacity-40">${fmtTime(opp.timeLeft)} left · ${opp.solved}/${WORDS_TO_SOLVE}</p>
                                </div>
                            </div>
                            ${state.history.map((myRound, i) => {
                                const oppRound = opp.history[i] || { w: myRound.word, g: [], s: 0 };
                                return `
                                <div class="w-full mb-3">
                                    <p class="text-[7px] text-[#54D8A8] tracking-widest uppercase mb-1 text-center">Word ${i+1}: ${myRound.word}</p>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div class="flex flex-col items-center">
                                            <p class="text-[6px] opacity-40 mb-1 uppercase">You ${myRound.solved ? '✓' : '✗'}</p>
                                            <div class="grid gap-[2px]">${renderMiniGrid(myRound.guesses, myRound.word)}</div>
                                        </div>
                                        <div class="flex flex-col items-center">
                                            <p class="text-[6px] opacity-40 mb-1 uppercase">Opp ${oppRound.s ? '✓' : '✗'}</p>
                                            <div class="grid gap-[2px]">${renderMiniGrid(oppRound.g, oppRound.w)}</div>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                            <button onclick="changeView('START')" class="pixel-btn w-full text-[12px] py-3 mt-2">MAIN MENU</button>
                        </div>`;

                } else {
                    // ── Solo / Challenge P1 finish ─────────────────────────────
                    viewEl.innerHTML = `
                        <div class="w-full max-w-2xl pixel-border p-10 text-center animate-fade-in mx-4">
                            <p class="text-glow text-2xl mb-8 uppercase">Match Complete</p>
                            <div class="grid grid-cols-2 gap-4 mb-8">
                                <div class="bg-[#002D47] p-4 pixel-border-small">
                                    <p class="text-[10px] mb-3 opacity-60 uppercase">Solved</p>
                                    <p class="text-lg">${state.solvedCount}/${WORDS_TO_SOLVE}</p>
                                </div>
                                <div class="bg-[#002D47] p-4 pixel-border-small">
                                    <p class="text-[10px] mb-3 opacity-60 uppercase">Clock</p>
                                    <p class="text-lg">${Math.floor(state.timeLeft/60)}:${(state.timeLeft%60).toString().padStart(2,'0')}</p>
                                </div>
                            </div>
                            <div class="mb-8 p-8 bg-[#001D2E] pixel-border-small">
                                <p class="text-[10px] mb-4 opacity-60 uppercase tracking-widest">Final Rating</p>
                                <p class="text-5xl md:text-7xl text-[#54D8A8] text-glow italic">${finalScore}</p>
                            </div>
                            <div id="share-code-section"></div>
                            <div class="flex flex-col space-y-3">
                                <button id="share-btn" onclick="showMatchCode()" class="pixel-btn pixel-btn-secondary w-full text-[12px] py-3">SHARE AS CHALLENGE</button>
                                <button onclick="changeView('START')" class="pixel-btn w-full text-[12px] py-3">MAIN MENU</button>
                            </div>
                        </div>`;
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            let k = e.key.toUpperCase();
            if (k === 'BACKSPACE') k = 'BKSP';
            if (k === 'ENTER' || k === 'BKSP' || /^[A-Z]$/.test(k)) handleInput(k);
        });

        window.addEventListener('popstate', () => {
            if (state.view === 'PLAYING') {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
                confirmForfeit();
            } else if (state.view === 'RECORDS' || state.view === 'RULES' || state.view === 'FINISHED') {
                changeView('START');
            }
        });

        render();
    </script>
</body>
</html>
