    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLYPH - 8-BIT ARCADE</title>
    <!-- Preconnect to font servers to reduce loading delay -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #002D47;
            color: #76E0B9;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            image-rendering: pixelated;
        }

        /* 8-Bit Pixel Borders */
        .pixel-border {
            box-shadow:
                0 -4px 0 0 #54D8A8,
                0 4px 0 0 #54D8A8,
                -4px 0 0 0 #54D8A8,
                4px 0 0 0 #54D8A8;
            background: #001D2E;
        }

        .pixel-border-small {
            box-shadow:
                0 -2px 0 0 #54D8A8,
                0 2px 0 0 #54D8A8,
                -2px 0 0 0 #54D8A8,
                2px 0 0 0 #54D8A8;
        }

        .pixel-btn {
            position: relative;
            background: #54D8A8;
            color: #002D47;
            padding: 10px;
            box-shadow: inset -4px -4px 0 0 #3ea17e;
            transition: all 0.1s;
            text-align: center;
        }
        .pixel-btn:active {
            box-shadow: inset 4px 4px 0 0 #3ea17e;
            transform: translateY(2px);
        }

        /* Danger Style */
        .pixel-btn-danger {
            background: #ef4444;
            color: white;
            box-shadow: inset -4px -4px 0 0 #991b1b;
        }
        .pixel-btn-danger:active {
            box-shadow: inset 4px 4px 0 0 #991b1b;
        }

        /* Tile & Key States */
        .tile-correct { background-color: #54D8A8; color: #002D47; box-shadow: inset -4px -4px 0 0 #3ea17e; }
        .tile-present { background-color: #FACC15; color: #002D47; box-shadow: inset -4px -4px 0 0 #ca8a04; }
        .tile-absent { background-color: #ef4444; color: #002D47; box-shadow: inset -4px -4px 0 0 #b91c1c; opacity: 0.6; }

        /* Greyed out keyboard state */
        .key-absent { background-color: #001A29 !important; color: #003D5B !important; box-shadow: none !important; opacity: 0.4; }

        .tile-empty { border: 4px solid #003D5B; background: #001D2E; }
        .tile-active { border: 4px solid #76E0B9; background: #002D47; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 0.8s infinite; }

        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #001D2E; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #54D8A8; }

        .text-glow { text-shadow: 0 0 15px #54D8A8; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Accordion Styles */
        details summary { list-style: none; cursor: pointer; outline: none; }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary { border-bottom: 2px solid #54D8A8; margin-bottom: 10px; }
    </style>
</head>

        /** GLOBAL SETS FOR PERFORMANCE **/
        const VALID_WORDS_SET = new Set(WORD_LIST);
        const WORDS_TO_SOLVE = 3;
        const GUESSES_PER_WORD = 5;
        const WORD_LENGTH = 5;
        const COUNTDOWN_START = 600;
        const STORAGE_KEY = 'glyph_arcade_stats';

        let state = {
            view: 'START',
            targetWords: [],
            currentIdx: 0,
            guesses: [],
            currentGuess: "",
            solvedCount: 0,
            allGuessesCount: 0,
            timeLeft: COUNTDOWN_START,
            timerInterval: null,
            history: [],

            stats: loadStats()
        };

        const viewEl = document.getElementById('view');
        const overlayEl = document.getElementById('overlay');
        const headerEl = document.getElementById('game-header');

        function loadStats() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : { highScore: 0, matchHistory: [] };
        }

        function saveMatch(score, isForfeit = false) {
            state.stats.highScore = Math.max(state.stats.highScore, score);
            const roundsToSave = [...state.history];
            if (isForfeit && state.guesses.length > 0) {
                 roundsToSave.push({
                    word: state.targetWords[state.currentIdx],
                    guesses: [...state.guesses],
                    solved: false,
                    isPartial: true
                });
            }
            state.stats.matchHistory.unshift({
                score: score,
                date: new Date().toLocaleDateString(),
                wordsSolved: state.solvedCount,
                rounds: JSON.parse(JSON.stringify(roundsToSave)),
                status: isForfeit ? 'FORFEIT' : 'FINISHED'
            });
            state.stats.matchHistory = state.stats.matchHistory.slice(0, 10);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.stats));
        }

        function changeView(newView) {
            state.view = newView;
            if (newView === 'PLAYING') {
                headerEl.classList.replace('mb-12', 'mb-4');
            } else {
                headerEl.classList.replace('mb-4', 'mb-12');
            }
            render();
        }

        function confirmForfeit() {
            overlayEl.classList.replace('hidden', 'flex');
            overlayEl.innerHTML = `
                <div class="w-full max-w-sm pixel-border p-10 bg-[#001D2E] animate-fade-in">
                    <p class="text-[10px] mb-8 border-b-4 border-[#ef4444] pb-4 text-glow uppercase text-center" style="text-shadow: 0 0 10px #ef4444">Confirm Forfeit?</p>
                    <div class="grid gap-6">
                        <button onclick="executeForfeit()" class="pixel-btn pixel-btn-danger w-full text-sm py-4">YES, FORFEIT</button>
                        <button onclick="closeOverlay()" class="pixel-btn w-full text-sm py-4">NO, RETURN</button>
                    </div>
                </div>
            `;
        }

        function executeForfeit() {
            clearInterval(state.timerInterval);
            saveMatch(calculateScore(), true);
            state.targetWords = [];
            state.guesses = [];
            state.currentGuess = "";
            state.history = [];
            state.message = "";
            state.isLocked = false;
            closeOverlay();
            changeView('START');
        }

        function startMatch() {
            const targets = [];
            while(targets.length < WORDS_TO_SOLVE) {
                const word = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
                if(!targets.includes(word)) targets.push(word);
            }
            state.targetWords = targets;
            state.currentIdx = 0;
            state.guesses = [];
            state.solvedCount = 0;
            state.allGuessesCount = 0;
            state.history = [];
            state.timeLeft = COUNTDOWN_START;
            state.isLocked = false;
            state.message = "";

            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                if (state.timeLeft <= 0) {
                    state.timeLeft = 0;
                    clearInterval(state.timerInterval);
                    state.view = 'FINISHED';
                    saveMatch(calculateScore());
                    render();
                }
                updateTimerUI();
            }, 1000);

            changeView('PLAYING');
            updateTimerUI();
        }

        function getRowStatuses(guess, target) {
            let statuses = Array(WORD_LENGTH).fill('tile-absent');
            let targetArr = target.split('');
            let guessArr = guess.split('');
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessArr[i] === targetArr[i]) {
                    statuses[i] = 'tile-correct';
                    targetArr[i] = null;
                    guessArr[i] = null;
                }
            }
            for (let i = 0; i < WORD_LENGTH; i++) {
                if (guessArr[i] !== null) {
                    let idx = targetArr.indexOf(guessArr[i]);
                    if (idx !== -1) {
                        statuses[i] = 'tile-present';
                        targetArr[idx] = null;
                    }
                }
            }
            return statuses;
        }

        function getKeyStates(guesses, target) {
            const states = {};
            guesses.forEach(guess => {
                guess.split('').forEach((letter) => {
                    if (!target.includes(letter)) {
                        states[letter] = 'key-absent';
                    }
                });
            });
            return states;
        }

        function handleInput(key) {
            if (state.view !== 'PLAYING' || state.isLocked) return;
            if (key === 'ENTER') {
                submitGuess();

                state.currentGuess = state.currentGuess.slice(0, -1);

            } else if (state.currentGuess.length < WORD_LENGTH && key.length === 1) {

            }

                    if (state.message === "NOT IN WORD LIST") {
                        state.message = "";
                        render();
                    }

            state.guesses.push(guess);
            state.allGuessesCount++;
            state.currentGuess = "";

            if (guess === target) {
                state.solvedCount++;
                state.message = "CLEARED!";
                state.isLocked = true;
                setTimeout(nextRound, 1200);
            } else if (state.guesses.length >= GUESSES_PER_WORD) {
                state.message = `FAIL! WORD: <span style="color:#ef4444">${target}</span>`;
                state.isLocked = true;
                setTimeout(nextRound, 2000);
            }
            render();
        }

        function nextRound() {
            state.history.push({
                word: state.targetWords[state.currentIdx],
                guesses: [...state.guesses],
                solved: state.guesses.includes(state.targetWords[state.currentIdx].toUpperCase())
            });
            if (state.currentIdx < WORDS_TO_SOLVE - 1) {
                state.currentIdx++;
                state.guesses = [];
                state.isLocked = false;
                state.message = "";
                render();
            } else {
                state.view = 'FINISHED';
                clearInterval(state.timerInterval);
                saveMatch(calculateScore());
                render();
            }
        }

        function openDevConsole() {
            overlayEl.classList.replace('hidden', 'flex');
            overlayEl.innerHTML = `
                <div class="w-full max-w-sm pixel-border p-10 bg-[#001D2E] animate-fade-in">
                    <p class="text-[10px] mb-8 border-b-4 border-[#54D8A8] pb-4 text-glow uppercase text-center">Tactical Override</p>
                    <div class="grid gap-6">
                        <button onclick="devWin()" class="pixel-btn w-full text-sm py-4">WIN</button>
                        <button onclick="devLose()" class="pixel-btn pixel-btn-danger w-full text-sm py-4">LOSE</button>
                        <button onclick="closeOverlay()" class="text-[8px] opacity-40 uppercase underline mt-4 text-center">Close Console</button>
                    </div>
                </div>
            `;
        }

        function devWin() {
            const target = state.targetWords[state.currentIdx].toUpperCase();
            state.guesses.push(target);
            state.allGuessesCount++;
            state.solvedCount++;
            state.message = "OVERRIDE: WIN";
            state.isLocked = true;
            closeOverlay();
            setTimeout(nextRound, 1000);
            render();
        }

        function devLose() {
            const target = state.targetWords[state.currentIdx].toUpperCase();
            while(state.guesses.length < GUESSES_PER_WORD) {
                state.guesses.push("XXXXX");
                state.allGuessesCount++;
            }
            state.message = `FAIL! WORD: <span style="color:#ef4444">${target}</span>`;
            state.isLocked = true;
            closeOverlay();
            setTimeout(nextRound, 2000);
            render();
        }

        function closeOverlay() {
            overlayEl.classList.replace('flex', 'hidden');
        }

        function calculateScore() {
            if (state.allGuessesCount === 0) return 0;
            const basePoints = state.solvedCount * 1000;
            const accuracyFactor = state.solvedCount / state.allGuessesCount;
            const timeBonus = state.solvedCount > 0 ? Math.floor(state.timeLeft * 2) : 0;
            return Math.floor((basePoints * accuracyFactor) + timeBonus);
        }

        function updateTimerUI() {
            const el = document.getElementById('timer-val');
            if (el) {
                const mins = Math.floor(state.timeLeft / 60);
                const secs = state.timeLeft % 60;
                el.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        function render() {
            if (state.view === 'START') {
                viewEl.innerHTML = `
                    <div class="w-full max-w-2xl flex flex-col items-center space-y-12 animate-fade-in px-4">
                        <div class="pixel-border p-10 text-center w-full max-w-[480px]">
                            <p class="text-[12px] md:text-[14px] mb-6 text-[#54D8A8] tracking-widest uppercase">HIGH SCORE</p>
                            <p class="text-4xl md:text-6xl text-glow">${state.stats.highScore}</p>
                        </div>

                        <div class="flex flex-col w-full max-w-[480px] space-y-6">
                            <button onclick="startMatch()" class="pixel-btn w-full text-xl md:text-2xl py-6">START MATCH</button>
                            <button onclick="changeView('RECORDS')" class="pixel-btn w-full text-[12px] md:text-[14px] py-4">MATCH HISTORY</button>
                            <button onclick="changeView('RULES')" class="pixel-btn w-full text-[12px] md:text-[14px] py-4">GAME RULES</button>
                        </div>
                    </div>`;
            } else if (state.view === 'RULES') {
                viewEl.innerHTML = `
                    <div class="w-full max-w-2xl pixel-border p-10 animate-fade-in mx-4">
                        <p class="text-[12px] mb-8 border-b-4 border-[#54D8A8] pb-4 text-glow text-center uppercase tracking-widest">Game Manual</p>
                        <div class="max-h-[500px] overflow-y-auto custom-scroll pr-4">
                            <ul class="text-[10px] leading-[2.2] space-y-8 text-[#76E0B9]/90">
                                <li>The goal is simple: solve 3 different hidden words as fast as you can to get the highest score.</li>
                                <li>You have 5 attempts to find each word. If you don't find it in time, the game will reveal the answer and move you to the next round automatically.</li>
                                <li>After each guess, the color of the tiles will change to show how close you were:
                                    <br>> <span style="color:#54D8A8">[GREEN]</span> means the letter is correct and in the right spot.
                                    <br>> <span style="color:#FACC15">[YELLOW]</span> means the letter is in the word, but in the wrong spot.
                                    <br>> <span style="color:#ef4444">[RED]</span> means that letter isn't used in the word at all.
                                </li>
                                <li>To help you be precise, if a letter appears only once in the word but you guess it twice, only one tile will light up green or yellow. This tells you exactly how many times that letter is actually used.</li>
                                <li>Your final score is based on how many words you found and how many guesses you used. Plus, finishing quickly adds a big speed bonus to your total!</li>
                            </ul>
                        </div>
                        <button onclick="changeView('START')" class="pixel-btn w-full mt-12 text-[12px]">BACK TO MAIN MENU</button>
                    </div>`;
            } else if (state.view === 'RECORDS') {
                const historyHtml = state.stats.matchHistory.length > 0
                    ? state.stats.matchHistory.map(h => {
                        const roundsHtml = (h.rounds || []).map((r, i) => `
                            <div class="mt-4 border-l-4 border-[#54D8A8] pl-3 py-1 bg-[#002D47]/40">
                                <p class="text-[8px] text-[#54D8A8] mb-2">PHASE ${i+1}: ${r.word} ${r.isPartial ? '(FORFEITED)' : ''}</p>
                                <div class="text-[7px] text-white/60 leading-relaxed uppercase">
                                    ${r.guesses.length > 0 ? r.guesses.map(g => `[ ${g} ]`).join(' ') : '[ NO DATA ]'}
                                </div>
                            </div>
                        `).join('');
                        const statusTag = h.status === 'FORFEIT' ? '<span style="color:#ef4444; font-size: 7px; margin-left: 5px;">[FORFEIT]</span>' : '';
                        return `
                        <div class="mb-6 border-b border-[#003D5B] pb-4">
                            <details class="w-full">
                                <summary class="flex justify-between items-center text-[10px] w-full">
                                    <span class="opacity-60">${h.date}</span>
                                    <span class="text-[#54D8A8]">${h.score} PTS ${statusTag} <small>▼</small></span>
                                </summary>
                                <div class="mt-4 animate-fade-in">
                                    <p class="text-[8px] opacity-40 uppercase mb-2">Match Details:</p>
                                    ${roundsHtml}
                                </div>
                            </details>
                        </div>`;
                    }).join('')
                    : `<div class="text-[12px] opacity-40 py-16 text-center tracking-widest uppercase">EMPTY LOG</div>`;

                viewEl.innerHTML = `
                    <div class="w-full max-w-2xl pixel-border p-10 animate-fade-in mx-4">
                        <p class="text-[12px] mb-8 border-b-4 border-[#54D8A8] pb-4 text-glow text-center uppercase tracking-widest">Match History</p>
                        <div class="max-h-96 overflow-y-auto custom-scroll pr-4">
                            ${historyHtml}
                        </div>
                        <button onclick="changeView('START')" class="pixel-btn w-full mt-12 text-[12px]">BACK TO MAIN MENU</button>
                    </div>`;
            } else if (state.view === 'PLAYING') {
                const target = state.targetWords[state.currentIdx].toUpperCase();
                const keyStates = getKeyStates(state.guesses, target);
                viewEl.innerHTML = `
                    <div class="w-full max-w-lg flex flex-col items-center">
                        <div class="w-full flex justify-between gap-4 mb-4 px-4">
                            <div class="flex-1 bg-[#001D2E] pixel-border-small p-4 flex flex-col items-center">
                                <span class="text-[8px] mb-2 opacity-60 uppercase">PHASE</span>
                                <span class="text-sm">${state.currentIdx + 1}/3</span>
                            </div>
                            <div class="flex-1 bg-[#001D2E] pixel-border-small p-4 flex flex-col items-center">
                                <span class="text-[8px] mb-2 opacity-60 uppercase">CLOCK</span>
                                <span id="timer-val" class="text-sm text-[#54D8A8]">0:00</span>
                            </div>
                        </div>
                        <div class="h-10 mb-2 text-[10px] flex items-center justify-center text-center px-4">
                            ${state.message ? `<span class="blink">[ ${state.message} ]</span>` : ''}
                        </div>
                        <div class="grid grid-rows-5 gap-3 mb-6 p-6 pixel-border">
                            ${Array.from({length: 5}).map((_, i) => {
                                const guess = state.guesses[i] || "";
                                const isCurrent = i === state.guesses.length;
                                const rowStatuses = i < state.guesses.length ? getRowStatuses(guess, target) : [];
                                return `<div class="flex gap-2.5">
                                    ${Array.from({length: 5}).map((_, j) => {
                                        let char = isCurrent ? (state.currentGuess[j] || "") : (guess[j] || "");
                                        let cls = i < state.guesses.length ? rowStatuses[j] : (isCurrent && char ? 'tile-active' : 'tile-empty');
                                        return `<div class="w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center text-2xl sm:text-4xl font-black ${cls}">${char}</div>`;
                                    }).join('')}
                                </div>`;
                            }).join('')}
                        </div>
                        <div class="w-full max-w-lg grid gap-3 px-2 mb-10">
                            ${[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','BKSP']].map(row => `
                                <div class="flex justify-center gap-2">
                                    ${row.map(key => {
                                        const keyCls = keyStates[key] || '';
                                        return `
                                        <button onclick="handleInput('${key}')" class="pixel-btn ${keyCls} ${key.length > 1 ? 'px-3 text-[8px]' : 'w-8 sm:w-11 text-[10px]'} h-14">
                                            ${key === 'BKSP' ? '⌫' : key}
                                        </button>`;
                                    }).join('')}
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="confirmForfeit()" class="pixel-btn pixel-btn-danger text-[10px] py-4 px-8 w-full max-w-[400px] uppercase tracking-widest">
                            forfeit, and back to main menu
                        </button>
                    </div>`;
                updateTimerUI();
            } else if (state.view === 'FINISHED') {
                const finalScore = calculateScore();
                viewEl.innerHTML = `
                    <div class="w-full max-w-2xl pixel-border p-12 text-center animate-fade-in mx-4 shadow-xl">
                        <p class="text-glow text-2xl mb-10 uppercase">Mission Clear</p>
                        <div class="grid grid-cols-2 gap-6 mb-10">
                            <div class="bg-[#002D47] p-6 pixel-border-small">
                                <p class="text-[10px] mb-4 opacity-60 uppercase">Solved</p>
                                <p class="text-lg">${state.solvedCount}/3</p>
                            </div>
                            <div class="bg-[#002D47] p-6 pixel-border-small">
                                <p class="text-[10px] mb-4 opacity-60 uppercase">Clock</p>
                                <p class="text-lg">${Math.floor(state.timeLeft/60)}:${(state.timeLeft%60).toString().padStart(2,'0')}</p>
                            </div>
                        </div>
                        <div class="mb-12 p-10 bg-[#001D2E] pixel-border-small">
                            <p class="text-[10px] mb-6 opacity-60 uppercase tracking-widest">Final Rating</p>
                            <p class="text-5xl md:text-7xl text-[#54D8A8] text-glow italic">${finalScore}</p>
                        </div>
                        <button onclick="changeView('START')" class="pixel-btn w-full text-xl py-6" style="background:#54D8A8; color:#002D47;">
                            BACK TO MAIN MENU
                        </button>
                    </div>`;
            }
        }

        window.addEventListener('keydown', (e) => {
            let k = e.key.toUpperCase();
            if (k === 'BACKSPACE') k = 'BKSP';
            if (k === 'ENTER' || k === 'BKSP' || /^[A-Z]$/.test(k)) handleInput(k);
        });

        render();
    </script>
</body>
</html>
